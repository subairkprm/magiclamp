server {
    listen 80;
    server_name _;

    # ── MagicLamp UI ──────────────────────────
    location / {
        proxy_pass         http://ml_ui:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Brain API ─────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 20;

        proxy_pass         http://ml_brain:9000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── Auth endpoints (strict rate limit) ────
    location /api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://ml_brain:9000;
        proxy_set_header Host $host;
    }

    # ── Brain docs ────────────────────────────
    location /docs {
        proxy_pass http://ml_brain:9000/docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://ml_brain:9000/redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://ml_brain:9000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── CRM Agent ─────────────────────────────
    location /agent/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://ml_agent:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── N8N Workflows ─────────────────────────
    location /n8n/ {
        proxy_pass         http://ml_n8n:5678/;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
    }

    # ── Telegram Webhook (direct to agent) ────
    location /telegram/webhook {
        proxy_pass         http://ml_agent:8000/telegram/webhook;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health ────────────────────────────────
    location /health {
        proxy_pass http://ml_brain:9000/health;
    }

    # ── SSE streaming (chat) ──────────────────
    location /api/v1/brain/chat/ {
        proxy_pass          http://ml_brain:9000;
        proxy_set_header    Host $host;
        proxy_read_timeout  600s;
        proxy_buffering     off;
        proxy_cache         off;
        add_header          X-Accel-Buffering no;
    }
}
