# =============================================================
#  MAGICLAMP — Nginx Virtual Host
#  Routes all traffic to the correct service
#  Coolify runs separately on port 8000 (its own process)
# =============================================================

# ── Upstream definitions ──────────────────────────────────
upstream brain   { server ml_brain:9000;  keepalive 8; }
upstream agent   { server ml_agent:8000;  keepalive 4; }
upstream n8n     { server ml_n8n:5678;    keepalive 4; }
upstream ui      { server ml_ui:80;       keepalive 4; }

# ── HTTP → HTTPS redirect (when domain + SSL configured) ──
# Uncomment after running: make ssl DOMAIN=yourdomain.com
# server {
#     listen 80;
#     server_name yourdomain.com;
#     location /.well-known/acme-challenge/ { root /var/www/certbot; }
#     location / { return 301 https://$host$request_uri; }
# }

server {
    listen 80 default_server;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── MagicLamp UI (root) ───────────────────────────────
    location / {
        proxy_pass         http://ui;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── Brain API v1 ──────────────────────────────────────
    location /api/ {
        limit_req  zone=api burst=30 nodelay;
        limit_conn conn 30;

        proxy_pass         http://brain;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── Auth (strict rate limit) ──────────────────────────
    location = /api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://brain;
        proxy_set_header Host $host;
    }

    # ── API Docs — blocked in production (WS-04) ─────────────────
    # The FastAPI app also returns 404 for these when ENV=production.
    # Deny at the proxy layer as defence-in-depth.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 403;
    }

    # ── Health ────────────────────────────────────────────
    location = /health  { proxy_pass http://brain/health; }

    # ── CRM Agent ─────────────────────────────────────────
    location /agent/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://agent/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── N8N Workflows ─────────────────────────────────────
    location /n8n/ {
        proxy_pass         http://n8n/;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Telegram Webhook ──────────────────────────────────
    location = /telegram/webhook {
        proxy_pass       http://agent/telegram/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── SSE / Streaming (chat) ────────────────────────────
    location ~* ^/api/v1/brain/(chat|stream) {
        proxy_pass          http://brain;
        proxy_set_header    Host $host;
        proxy_read_timeout  600s;
        proxy_buffering     off;
        proxy_cache         off;
        chunked_transfer_encoding on;
        add_header          X-Accel-Buffering no;
    }

    # ── Coolify panel proxy (port 8000 → /panel/) ─────────
    # Coolify runs on the HOST at port 8000 (not in Docker network)
    # Access directly: http://YOUR_VPS_IP:8000
    # Or via this proxy: http://YOUR_VPS_IP/panel/
    location /panel/ {
        proxy_pass         http://host.docker.internal:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
    }
}
