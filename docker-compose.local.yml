version: "3.9"

# Local-only overrides for development and testing
services:
  ollama:
    ports:
      - "11434:11434"
    environment:
      ENV: development

  brain:
    environment:
      ENV: development
      BRAIN_AUTO_MODE: ${BRAIN_AUTO_MODE:-false}
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "9000:9000"

  agent:
    environment:
      ENV: development
    ports:
      - "8000:8000"

  n8n:
    environment:
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"

  nginx:
    ports:
      - "80:80"
      - "443:443"
