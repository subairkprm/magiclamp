[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --cov=brain
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=0
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take >1s
