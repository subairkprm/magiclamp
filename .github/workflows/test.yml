# =============================================================
#  MAGICLAMP — Test Suite CI
#  Runs on: push and pull_request
#  Tests Python code with pytest and coverage reporting
# =============================================================

name: Test Suite

on:
  push:
    branches: [main, develop, claude/**]
    paths:
      - 'brain/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'brain/**'
      - 'tests/**'
      - '.github/workflows/test.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            brain/requirements.txt
            tests/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r brain/requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Create test environment file
        run: |
          cat > .env << EOF
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_SERVICE_KEY=test_key_min_32_characters_long
          JWT_SECRET=test_jwt_secret_min_32_characters_long
          BRAIN_SECRET=test_brain_secret_min_32_characters
          OLLAMA_MODEL=test-model
          ENVIRONMENT=test
          BRAIN_AUTO_MODE=false
          EOF

      - name: Run pytest with coverage
        run: |
          cd brain
          pytest ../tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=0 \
            -v \
            --tb=short \
            --maxfail=5
        continue-on-error: false

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./brain/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage HTML report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: brain/htmlcov/
          retention-days: 7

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 60
          MINIMUM_ORANGE: 40

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy pylint
          pip install -r brain/requirements.txt

      - name: Check code formatting with Black
        run: |
          black --check brain/ --line-length 120
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only --profile black brain/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 brain/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 brain/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        continue-on-error: true

      - name: Type checking with mypy
        run: |
          mypy brain/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r brain/ -ll -i -x brain/tests
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: |
          safety check --file brain/requirements.txt
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build brain Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./brain
          file: ./brain/Dockerfile
          push: false
          tags: magiclamp-brain:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test brain container health
        run: |
          # Create minimal .env for testing
          cat > .env.test << EOF
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_SERVICE_KEY=test_key_min_32_characters_long
          JWT_SECRET=test_jwt_secret_min_32_characters_long
          BRAIN_SECRET=test_brain_secret_min_32_characters
          OLLAMA_MODEL=test-model
          BRAIN_AUTO_MODE=false
          EOF

          # Start container
          docker run -d --name brain-test \
            --env-file .env.test \
            -p 9000:9000 \
            magiclamp-brain:test

          # Wait for startup
          sleep 10

          # Check health endpoint
          curl -f http://localhost:9000/health || exit 1

          # Cleanup
          docker stop brain-test
          docker rm brain-test

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security, docker-build]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All checks passed"
