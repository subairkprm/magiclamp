name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Fixes"
    labels:
      - bug
      - fix
  - title: "🛠️ Maintenance"
    labels:
      - chore
      - refactor
      - dependencies
  - title: "🧪 Tests"
    labels:
      - test
      - testing
  - title: "📝 Docs"
    labels:
      - docs
  - title: "🔒 Security"
    labels:
      - security
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
no-changes-template: "No changes in this release."
template: |
  ## Summary
  $CHANGES

  ## Contributors
  $CONTRIBUTORS
