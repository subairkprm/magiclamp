name: "🛠️ Support Request"
description: Ask for setup help or usage guidance.
labels:
  - question
  - needs-triage
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to accomplish?
      description: Share the command, API call, or workflow you're attempting.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details & logs
      description: Include error messages, screenshots, and relevant config snippets (redact secrets).
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g., local dev (macOS 14), Docker, VPS prod, Python 3.12
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues/PRs or steps already tried.
