name: "✨ Feature Request"
description: Propose a new capability or improvement.
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user need or business goal is this addressing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or API. Include examples or UX notes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
  - type: textarea
    id: impact
    attributes:
      label: Impact & users
      description: Who benefits? How will success be measured?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues/PRs.
