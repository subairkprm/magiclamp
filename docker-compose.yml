version: "3.9"

# =============================================================
#  MAGICLAMP — Complete Production Stack
#  Includes: Ollama, Brain, Agent, N8N, UI, Nginx, Coolify
#  Start everything: docker compose up -d
# =============================================================

x-common-env: &common-env
  SUPABASE_URL:           ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY:   ${SUPABASE_SERVICE_KEY}
  OLLAMA_URL:             http://ollama:11434
  OLLAMA_MODEL:           ${OLLAMA_MODEL:-qwen2.5:7b}
  TELEGRAM_BOT_TOKEN:     ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
  ENV:                    production

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── 1. OLLAMA — Local LLM Engine ──────────────────────────
  ollama:
    image: ollama/ollama:0.23.4@sha256:7ffd891da3e9e278d042c856c0fbe1b10fa03ed1791471377dde331eae4ea834
    container_name: ml_ollama
    <<: [*restart, *logging]
    expose:
      - "11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ── 2. BRAIN — Master Control ──────────────────────────────
  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: ml_brain
    <<: [*restart, *logging]
    expose:
      - "9000"
    environment:
      <<: *common-env
      JWT_SECRET:      ${JWT_SECRET}
      BRAIN_SECRET:    ${BRAIN_SECRET}
      BRAIN_DATA_DIR:  /data/brain
      BRAIN_AUTO_MODE: ${BRAIN_AUTO_MODE:-true}
      N8N_URL:         http://n8n:5678
      N8N_API_KEY:     ${N8N_API_KEY:-}
    volumes:
      - ./data/brain:/data/brain
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 2G

  # ── 3. AGENT — CRM AI Agent ────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: ml_agent
    <<: [*restart, *logging]
    expose:
      - "8000"
    environment:
      <<: *common-env
      SUPABASE_KEY: ${SUPABASE_SERVICE_KEY}
      SECRET_KEY:   ${BRAIN_SECRET}
    depends_on:
      - brain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 512M

  # ── 4. N8N — Workflow Automation ───────────────────────────
  n8n:
    image: n8nio/n8n:2.20.9@sha256:fe36dc659e17c046255eb56ef65e7776eb7d13e4ca83a76bef137effa090972d
    container_name: ml_n8n
    <<: [*restart, *logging]
    user: "1000:1000"
    expose:
      - "5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Asia/Dubai
      - N8N_LOG_LEVEL=warn
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=72
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-}
      - WEBHOOK_URL=http://${SERVER_HOST:-localhost}/n8n/
    volumes:
      - ./data/n8n:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 512M

  # ── 5. UI — MagicLamp Frontend ─────────────────────────────
  ui:
    image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: ml_ui
    <<: [*restart, *logging]
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./nginx/ui.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - brain
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 64M

  # ── 6. NGINX — Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: ml_nginx
    <<: [*restart, *logging]
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - brain
      - agent
      - ui
      - n8n
    networks: [magiclamp]
    deploy:
      resources:
        limits:
          memory: 128M

  # ── 7. CERTBOT — Auto SSL ──────────────────────────────────
  certbot:
    image: certbot/certbot:v5.6.0@sha256:0107d084c225631fc64a8313e19adb07275f7296fde338f7dfa93986c80b2e3e
    container_name: ml_certbot
    volumes:
      - ./data/certbot/www:/var/www/certbot:rw
      - ./data/certbot/conf:/etc/letsencrypt:rw
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks: [magiclamp]

networks:
  magiclamp:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ollama_data:
  brain_data:
  n8n_data:
